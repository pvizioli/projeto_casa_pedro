<html lang="pt-BR">

<meta charset="UTF-8">

<title>Q22·L8 — Circuitos · Elétrica</title>
<style>
:root{--navy:#14407d;--mid:#4f6fa5;--lt:#c3cfe2;--wall:#d4dcea;--grid:#eef1f7;--paper:#fff;--bg:#dfe4ec;--hi:#0d2c58}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);font-family:"IBM Plex Mono","Consolas","Courier New",monospace;color:var(--navy)}
header{background:var(--paper);border-bottom:2px solid var(--navy);padding:16px 26px;display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
header .eyebrow{font-size:10px;letter-spacing:3px;color:var(--mid)}
header h1{font-size:19px;letter-spacing:4px}
header .right{margin-left:auto;display:flex;gap:10px}
.tab{border:1.5px solid var(--navy);background:var(--paper);color:var(--navy);font:inherit;font-size:11px;letter-spacing:2px;padding:7px 14px;cursor:pointer}
.tab.on{background:var(--navy);color:#fff}
.tab[disabled]{opacity:.45;cursor:not-allowed}
.btn{border:1.5px solid var(--navy);background:var(--paper);color:var(--navy);font:inherit;font-size:11px;letter-spacing:1px;padding:7px 12px;cursor:pointer}
.btn:hover{background:var(--navy);color:#fff}
main{display:grid;grid-template-columns:290px 1fr;gap:0;min-height:calc(100vh - 70px)}
aside{background:var(--paper);border-right:1.5px solid var(--lt);padding:14px 0;overflow-y:auto;max-height:calc(100vh - 70px)}
aside h2{font-size:10px;letter-spacing:3px;color:var(--mid);padding:12px 18px 6px}
.circ{display:block;width:100%;text-align:left;border:0;background:none;font:inherit;font-size:11.5px;color:var(--navy);padding:7px 18px;cursor:pointer;border-left:4px solid transparent;line-height:1.35}
.circ small{display:block;font-size:9.5px;color:var(--mid)}
.circ:hover{background:#f0f4fa}
.circ.on{background:#e6edf8;border-left-color:var(--navy);font-weight:700}
.stage{padding:20px 26px;overflow:auto}
.plans{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1180px}
.plan{background:var(--paper);box-shadow:0 2px 12px rgba(20,64,125,.15);padding:10px}
.plan h3{font-size:11px;letter-spacing:3px;padding:6px 8px;color:var(--mid)}
.info{max-width:1180px;background:var(--navy);color:#fff;margin-bottom:18px;padding:14px 20px;display:flex;gap:34px;flex-wrap:wrap;align-items:baseline}
.info b{font-size:15px;letter-spacing:2px}
.info span{font-size:11px;color:#c8d5ea}
.info .tagdr{border:1px solid #c8d5ea;padding:2px 8px;font-size:10px;letter-spacing:2px}
svg{width:100%;height:auto;display:block}
text{font-family:inherit}
.wall{stroke:var(--wall);stroke-width:5;fill:none}
.wall2{stroke:var(--wall);stroke-width:2.5;fill:none}
.wthin{stroke:#e2e8f2;stroke-width:1.2;fill:none}
.room{font-size:9px;fill:#9fb1cd;letter-spacing:1px}
.pt{transition:opacity .15s}
.pt.dim{opacity:.14}
.rt{fill:none;stroke:var(--navy);stroke-width:2.2;stroke-dasharray:3 4;stroke-linecap:round}
.rt.dim{opacity:.12}
.lbl{font-size:8.5px;fill:var(--navy)}
.quadro{fill:var(--navy)}
.quadrolbl{font-size:8.5px;fill:var(--navy);font-weight:700}
.placeholder{max-width:760px;background:var(--paper);padding:34px;box-shadow:0 2px 12px rgba(20,64,125,.15)}
.placeholder h3{letter-spacing:3px;margin-bottom:14px}
.placeholder p{font-size:12px;line-height:1.7;color:var(--mid);margin-bottom:10px}
@media print{
 header .right, aside{display:none}
 main{grid-template-columns:1fr}
 body{background:#fff}
 .plan{box-shadow:none;border:1px solid var(--lt)}
}
@media (max-width:980px){main{grid-template-columns:1fr}aside{max-height:none;border-right:0;border-bottom:1.5px solid var(--lt)}.plans{grid-template-columns:1fr}}
</style>
</head>

/* ============ SÍMBOLOS ============ */
function sym(p){
 const c='#14407d';
 switch(p.s){
  case 'luz': return `<circle cx="${p.x}" cy="${p.y}" r="5.5" fill="#fff" stroke="${c}" stroke-width="1.6"/><line x1="${p.x-3.6}" y1="${p.y-3.6}" x2="${p.x+3.6}" y2="${p.y+3.6}" stroke="${c}" stroke-width="1.3"/><line x1="${p.x-3.6}" y1="${p.y+3.6}" x2="${p.x+3.6}" y2="${p.y-3.6}" stroke="${c}" stroke-width="1.3"/>`;
  case 'tug': return `<circle cx="${p.x}" cy="${p.y}" r="5.5" fill="#fff" stroke="${c}" stroke-width="1.7"/><line x1="${p.x-5.5}" y1="${p.y}" x2="${p.x+5.5}" y2="${p.y}" stroke="${c}" stroke-width="1.4"/>`;
  case 't220': return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="${c}"/><circle cx="${p.x}" cy="${p.y}" r="2.1" fill="#fff"/>`;
  case 'sw': return `<rect x="${p.x-5.5}" y="${p.y-5.5}" width="11" height="11" fill="#fff" stroke="${c}" stroke-width="1.5"/><text x="${p.x}" y="${p.y+3.2}" font-size="7.5" text-anchor="middle" font-weight="700" fill="${c}">S</text>`;
  case 'sens': return `<path d="M${p.x},${p.y-6.5} ${p.x+6.5},${p.y} ${p.x},${p.y+6.5} ${p.x-6.5},${p.y}Z" fill="#fff" stroke="${c}" stroke-width="1.4"/><text x="${p.x}" y="${p.y+2.8}" font-size="6.8" text-anchor="middle" font-weight="700" fill="${c}">P</text>`;
  case 'ip55': return `<rect x="${p.x-6}" y="${p.y-6}" width="12" height="12" fill="#fff" stroke="${c}" stroke-width="1.5"/><circle cx="${p.x}" cy="${p.y}" r="3" fill="none" stroke="${c}" stroke-width="1.2"/>`;
  case 'eq': return `<rect x="${p.x-9}" y="${p.y-6}" width="18" height="12" fill="#fff" stroke="${c}" stroke-width="1.7"/><line x1="${p.x-9}" y1="${p.y-6}" x2="${p.x+9}" y2="${p.y+6}" stroke="${c}" stroke-width="1.1"/>`;
  /* --- hidráulica --- */
  case 'af':  return `<circle cx="${p.x}" cy="${p.y}" r="5.5" fill="#fff" stroke="${c}" stroke-width="1.7"/><text x="${p.x}" y="${p.y+3}" font-size="7" text-anchor="middle" font-weight="700" fill="${c}">F</text>`;
  case 'aq':  return `<circle cx="${p.x}" cy="${p.y}" r="5.5" fill="${c}"/><text x="${p.x}" y="${p.y+3}" font-size="7" text-anchor="middle" font-weight="700" fill="#fff">Q</text>`;
  case 'esg': return `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#fff" stroke="${c}" stroke-width="1.6" stroke-dasharray="2.6 2"/><circle cx="${p.x}" cy="${p.y}" r="2" fill="${c}"/>`;
  case 'ralo':return `<rect x="${p.x-9}" y="${p.y-3.5}" width="18" height="7" fill="#fff" stroke="${c}" stroke-width="1.5"/><line x1="${p.x-5}" y1="${p.y-3.5}" x2="${p.x-5}" y2="${p.y+3.5}" stroke="${c}" stroke-width="1"/><line x1="${p.x}" y1="${p.y-3.5}" x2="${p.x}" y2="${p.y+3.5}" stroke="${c}" stroke-width="1"/><line x1="${p.x+5}" y1="${p.y-3.5}" x2="${p.x+5}" y2="${p.y+3.5}" stroke="${c}" stroke-width="1"/>`;
  case 'pru': return `<circle cx="${p.x}" cy="${p.y}" r="7" fill="#fff" stroke="${c}" stroke-width="1.7"/><line x1="${p.x-4.6}" y1="${p.y-4.6}" x2="${p.x+4.6}" y2="${p.y+4.6}" stroke="${c}" stroke-width="1.4"/><line x1="${p.x-4.6}" y1="${p.y+4.6}" x2="${p.x+4.6}" y2="${p.y-4.6}" stroke="${c}" stroke-width="1.4"/>`;
  case 'mnf': return `<rect x="${p.x-11}" y="${p.y-5}" width="22" height="10" fill="#fff" stroke="${c}" stroke-width="1.8"/><line x1="${p.x-6}" y1="${p.y+5}" x2="${p.x-6}" y2="${p.y+9}" stroke="${c}" stroke-width="1.2"/><line x1="${p.x}" y1="${p.y+5}" x2="${p.x}" y2="${p.y+9}" stroke="${c}" stroke-width="1.2"/><line x1="${p.x+6}" y1="${p.y+5}" x2="${p.x+6}" y2="${p.y+9}" stroke="${c}" stroke-width="1.2"/>`;
  case 'eqh': return `<rect x="${p.x-10}" y="${p.y-7}" width="20" height="14" rx="2" fill="#fff" stroke="${c}" stroke-width="1.7"/><circle cx="${p.x}" cy="${p.y}" r="3.4" fill="none" stroke="${c}" stroke-width="1.2"/>`;
 }
 return '';
}
function ptG(c,p){
 const lbl = p.l?`<text x="${p.x}" y="${p.y-10}" class="lbl" text-anchor="middle">${p.l}</text>`:'';
 return `<g class="pt" data-c="${c.id}">${sym(p)}${lbl}</g>`;
}

/* ============ RENDER ============ */
const VB='170 215 520 800';
let FASE='ele';                                  // 'ele' | 'hid'
const dados = () => FASE==='ele' ? CIRC : CIRC_HID;
const GRUPOS = {
  ele:[['QDC','QDC — LAVANDERIA'],['QDCA','QDCA — TÉCNICA']],
  hid:[['AF','ÁGUA FRIA'],['AQ','ÁGUA QUENTE'],['ESG','ESGOTO'],['PLU','PLUVIAL']]
};
function render(){
 let t=baseT(), s=baseS();
 for(const c of dados()){
  for(const r of (c.rts||[])) (r.f==='t'?t+= `<path d="${r.d}" class="rt" data-c="${c.id}"/>`:s+=`<path d="${r.d}" class="rt" data-c="${c.id}"/>`);
  for(const p of c.pts) (p.f==='t'? t+=ptG(c,p) : s+=ptG(c,p));
 }
 document.getElementById('svgT').innerHTML=`<svg viewBox="${VB}" xmlns="http://www.w3.org/2000/svg">${t}</svg>`;
 document.getElementById('svgS').innerHTML=`<svg viewBox="${VB}" xmlns="http://www.w3.org/2000/svg">${s}</svg>`;
}
function lista(){
 const a=document.getElementById('lista');
 const nome = FASE==='ele' ? 'elétrica' : 'hidráulica';
 let h=`<button class="circ on" data-id="ALL"><b>VER TODOS OS CIRCUITOS</b><small>${nome} completa · térreo + superior</small></button>`;
 for(const [chave,titulo] of GRUPOS[FASE]){
   const g = dados().filter(c=>c.q===chave);
   if(!g.length) continue;
   h+=`<h2>${titulo}</h2>`;
   for(const c of g) h+=item(c);
 }
 a.innerHTML=h;
 a.querySelectorAll('.circ').forEach(b=>b.addEventListener('click',()=>select(b.dataset.id)));
}
function item(c){
 const flag = c.dr ? (FASE==='ele' ? ' · DR 30mA' : ' · ⚠ RADIER — sem retorno') : '';
 return `<button class="circ" data-id="${c.id}">${c.id} · ${c.nome}<small>${c.v} · ${c.disj} · ${c.cabo}${flag}</small></button>`;
}
function select(id){
 document.querySelectorAll('.circ').forEach(b=>b.classList.toggle('on',b.dataset.id===id));
 document.querySelectorAll('[data-c]').forEach(el=>{
   el.classList.toggle('dim', id!=='ALL' && el.dataset.c!==id);
 });
 const i=document.getElementById('info');
 if(id==='ALL'){
  const resumo = FASE==='ele'
    ? `${CIRC.length} circuitos · QDC lavanderia + QDCA técnica`
    : `${CIRC_HID.length} circuitos · água fria/quente, esgoto e pluvial`;
  i.innerHTML=`<b>${FASE==='ele'?'ELÉTRICA':'HIDRÁULICA'} — TODOS OS CIRCUITOS</b><span>${resumo}</span><span>selecione um circuito à esquerda para isolar os pontos dele nas plantas</span>`;
 }else{
  const c=dados().find(c=>c.id===id);
  const tag = c.dr ? (FASE==='ele' ? '<span class="tagdr">DR 30mA</span>' : '<span class="tagdr">PONTO SEM RETORNO — RADIER</span>') : '';
  i.innerHTML=`<b>${c.id} — ${c.nome}</b><span>${c.q}</span><span>${c.v} · ${c.disj} · ${c.cabo}</span>${tag}<span>${c.pts.length} ponto(s)</span>`;
 }
}

/* ============ TROCA DE FASE ============ */
function fase(f){
 FASE=f;
 document.getElementById('tabEle').classList.toggle('on', f==='ele');
 document.getElementById('tabHid').classList.toggle('on', f==='hid');
 document.querySelector('header h1').textContent = f==='ele' ? 'CIRCUITOS' : 'HIDRÁULICA';
 render(); lista(); select('ALL');
}
document.getElementById('tabEle').addEventListener('click',()=>fase('ele'));
document.getElementById('tabHid').addEventListener('click',()=>fase('hid'));

render();lista();select('ALL');
</script>
