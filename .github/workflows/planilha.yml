name: Atualizar planilha

# Roda sempre que o site commitar dados (cotação lançada, avanço de etapa)
on:
  push:
    branches: [main]
    paths:
      - 'dados/**'
      - 'scripts/build_planilha.py'
      - 'scripts/publicar_planilha.sh'
      - '.github/workflows/planilha.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: planilha
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install --quiet openpyxl

      - name: Gerar, recalcular e publicar (com retentativa)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/publicar_planilha.sh
