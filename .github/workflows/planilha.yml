name: Atualizar planilha

# Roda sempre que o site commitar dados (cotação lançada, avanço de etapa)
on:
  push:
    branches: [main]
    paths:
      - 'dados/**'
      - 'scripts/build_planilha.py'
      - '.github/workflows/planilha.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: planilha
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install --quiet openpyxl

      - name: Gerar planilha a partir dos JSONs
        run: python scripts/build_planilha.py

      - name: Recalcular fórmulas (LibreOffice já vem no runner)
        run: |
          mkdir -p /tmp/recalc
          if soffice --headless --calc --convert-to xlsx --outdir /tmp/recalc planilha-q22-l8.xlsx; then
            if [ -s /tmp/recalc/planilha-q22-l8.xlsx ]; then
              mv /tmp/recalc/planilha-q22-l8.xlsx planilha-q22-l8.xlsx
              echo "Fórmulas recalculadas e valores em cache."
            fi
          else
            echo "Recalc falhou — seguindo com o arquivo do openpyxl (Excel recalcula ao abrir)."
          fi

      - name: Commitar se mudou
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add planilha-q22-l8.xlsx
          if git diff --staged --quiet; then
            echo "Planilha sem alterações."
          else
            git commit -m "Planilha atualizada automaticamente [skip ci]"
            git push
          fi
